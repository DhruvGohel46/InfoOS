<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>InfoOS POS Loading</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&display=swap');

        :root {
            /* Common styles */
            --accent: #F97316;
            --accent-glow: rgba(249, 115, 22, 0.15);
        }

        /* Dark Theme Variables */
        .theme-dark {
            --background: #111827;
            --card-bg: #1F2937;
            --border: rgba(255, 255, 255, 0.08);
            --text-primary: #FFFFFF;
            --text-secondary: #9CA3AF;
            --glow-color: rgba(249, 115, 22, 0.08);
        }

        /* Light Theme Variables */
        .theme-light {
            --background: #F8FAFC;
            --card-bg: #FFFFFF;
            --border: #E5E7EB;
            --text-primary: #111827;
            --text-secondary: #6B7280;
            --glow-color: rgba(249, 115, 22, 0.03);
        }

        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            user-select: none;
            background: transparent;
            font-family: 'Outfit', sans-serif;
            -webkit-app-region: drag;
        }

        .splash-card {
            width: 400px;
            height: 300px;
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 24px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.25);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            box-sizing: border-box;
            padding: 32px;
            position: relative;
            overflow: hidden;
            opacity: 0;
            transform: scale(0.97);
            animation: fadeIn 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        @keyframes fadeIn {
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        /* Subtle glowing background circle */
        .glow {
            position: absolute;
            width: 250px;
            height: 250px;
            background: radial-gradient(circle, var(--glow-color) 0%, transparent 70%);
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            pointer-events: none;
            z-index: 0;
        }

        /* Decorative patterns */
        .pattern {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }

        .pattern-dark, .pattern-light {
            display: none;
        }

        .theme-dark .pattern-dark {
            display: block;
        }

        .theme-light .pattern-light {
            display: block;
        }

        /* Layout Sections */
        .top-section {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            z-index: 1;
            margin-top: 8px;
        }

        .logo {
            font-size: 36px;
            font-weight: 800;
            letter-spacing: -0.03em;
            color: var(--text-primary);
            display: flex;
            align-items: center;
            gap: 2px;
        }

        .logo span {
            color: var(--accent);
        }

        .subtitle {
            font-size: 11px;
            font-weight: 600;
            color: var(--accent);
            text-transform: uppercase;
            letter-spacing: 0.2em;
        }

        .center-section {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 16px;
            z-index: 1;
        }

        /* 60FPS Circular Loader */
        .spinner-container {
            position: relative;
            width: 48px;
            height: 48px;
        }

        .spinner-bg {
            width: 100%;
            height: 100%;
            border: 3.5px solid var(--border);
            border-radius: 50%;
            box-sizing: border-box;
        }

        .spinner {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: 3.5px solid transparent;
            border-top-color: var(--accent);
            border-radius: 50%;
            box-sizing: border-box;
            animation: spin 0.8s cubic-bezier(0.4, 0, 0.2, 1) infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .status {
            font-size: 13px;
            font-weight: 500;
            color: var(--text-secondary);
            letter-spacing: -0.01em;
            height: 20px;
            display: flex;
            align-items: center;
            opacity: 0.8;
            transition: opacity 0.2s ease;
        }

        .bottom-section {
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 1;
            font-size: 11px;
            font-weight: 400;
            color: var(--text-secondary);
            opacity: 0.6;
        }

        .version {
            font-weight: 500;
        }
    </style>
</head>
<body class="theme-dark">
    <div class="splash-card" id="card">
        <div class="glow"></div>
        
        <!-- Dark Theme Corner Curve SVG -->
        <svg class="pattern pattern-dark" viewBox="0 0 400 300" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M300 0 C 330 50, 350 150, 400 180" stroke="rgba(249, 115, 22, 0.08)" stroke-width="2" stroke-linecap="round"/>
            <path d="M330 0 C 355 40, 370 110, 400 130" stroke="rgba(255, 255, 255, 0.02)" stroke-width="1.5" stroke-linecap="round"/>
        </svg>

        <!-- Light Theme Decorative Lines SVG -->
        <svg class="pattern pattern-light" viewBox="0 0 400 300" fill="none" xmlns="http://www.w3.org/2000/svg">
            <line x1="0" y1="20" x2="60" y2="20" stroke="#F97316" stroke-width="2" opacity="0.3" stroke-linecap="round"/>
            <line x1="20" y1="10" x2="20" y2="70" stroke="#E5E7EB" stroke-width="1.5" stroke-linecap="round"/>
        </svg>

        <div class="top-section">
            <div class="logo">Info<span>OS</span></div>
            <div class="subtitle">BILLING SYSTEM</div>
        </div>

        <div class="center-section">
            <div class="spinner-container">
                <div class="spinner-bg"></div>
                <div class="spinner"></div>
            </div>
            <div class="status" id="status-text">Initializing...</div>
        </div>

        <div class="bottom-section">
            <div class="version" id="version-text">v1.0.0</div>
            <div>© 2026 InfoOS Inc.</div>
        </div>
    </div>

    <script>
        // Apply theme and version from query parameters
        const urlParams = new URLSearchParams(window.location.search);
        const theme = urlParams.get('theme') || 'dark';
        const version = urlParams.get('version') || 'v1.0.0';

        document.body.className = 'theme-' + theme;

        const versionText = document.getElementById('version-text');
        versionText.textContent = version.startsWith('v') ? version : 'v' + version;

        // Dynamic Loading Message Simulation
        const loadingSteps = [
            "Initializing...",
            "Loading Database...",
            "Connecting Services...",
            "Checking License...",
            "Loading Menu...",
            "Starting POS...",
            "Ready..."
        ];

        let currentStep = 0;
        const statusText = document.getElementById('status-text');

        function updateLoadingText() {
            if (currentStep < loadingSteps.length) {
                statusText.style.opacity = 0;
                setTimeout(() => {
                    statusText.textContent = loadingSteps[currentStep];
                    statusText.style.opacity = 0.8;
                    currentStep++;
                    
                    // Progressively scale the interval for realistic loading feel
                    const nextTimeout = currentStep === loadingSteps.length - 1 ? 800 : Math.random() * 400 + 400;
                    setTimeout(updateLoadingText, nextTimeout);
                }, 200);
            }
        }

        // Start dynamic text update
        setTimeout(updateLoadingText, 500);
    </script>
</body>
</html>
