name: Frontend E2E Tests

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  e2e:
    name: Playwright E2E
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      # Install root-level dependencies (electron-updater, playwright, etc.)
      - name: Install root dependencies
        run: npm ci

      # Install frontend dependencies
      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      - name: Build frontend for E2E
        run: npm run build --prefix frontend

      # Install Playwright browsers (Chromium only for speed)
      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      # Run E2E tests
      # The webServer block in playwright.config.js will auto-start a production build server
      - name: Run Playwright tests
        run: npx playwright test
        env:
          CI: "true"
          REACT_APP_API_URL: "http://127.0.0.1:5050"

      # Upload HTML report and screenshots on failure for debugging
      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14

      - name: Upload failure screenshots
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-screenshots
          path: test-results/
          retention-days: 7
